<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web高级开发实践题库</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Web高级开发实践</p>
      <h1>复习测试题库</h1>
    </div>
    <img src="./assets/study-board.png" alt="" class="study-art">
  </header>

  <main class="app-shell">
    <aside class="panel controls-panel">
      <label class="field-label" for="setFilter">套题</label>
      <select id="setFilter"></select>

      <label class="field-label" for="typeFilter">题型</label>
      <select id="typeFilter"></select>

      <label class="field-label" for="searchInput">搜索</label>
      <input id="searchInput" type="search" placeholder="输入关键词">

      <div class="field-label">顺序</div>
      <div class="segmented" role="group" aria-label="练习顺序">
        <button class="segment active" data-mode="ordered" type="button">顺序</button>
        <button class="segment" data-mode="random" type="button">随机</button>
        <button class="segment" data-mode="missed" type="button">错题</button>
      </div>

      <div class="stats-grid">
        <div><span id="totalCount">0</span><small>总题数</small></div>
        <div><span id="doneCount">0</span><small>已完成</small></div>
        <div><span id="rightCount">0</span><small>正确</small></div>
        <div><span id="accuracy">0%</span><small>正确率</small></div>
      </div>

      <div class="progress-track"><div id="progressBar"></div></div>

      <div id="questionNav" class="question-nav" aria-label="题目列表"></div>
    </aside>

    <section class="panel question-panel">
      <div class="question-meta">
        <span id="metaSet"></span>
        <span id="metaType"></span>
      </div>
      <h2 id="questionTitle"></h2>
      <div id="answerArea" class="answer-area"></div>
      <div id="feedback" class="feedback" hidden></div>
      <div id="analysisBox" class="analysis-box" hidden></div>
      <div class="actions">
        <button id="prevBtn" type="button">上一题</button>
        <button id="checkBtn" class="primary" type="button">确认答案</button>
        <button id="markBtn" type="button">标记</button>
        <button id="nextBtn" type="button">下一题</button>
      </div>
    </section>
  </main>

  <script src="./questions.js"></script>
  <script src="./script.js"></script>
</body>
</html>
